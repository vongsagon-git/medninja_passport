<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Test Serve — Auto Ali Prop / Widevine</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #e2e8f0;
      font-family: 'Sarabun', -apple-system, sans-serif;
      padding: 20px 16px;
      min-height: 100vh;
    }
    .wrap { max-width: 900px; margin: 0 auto; }
    .head { text-align: center; margin-bottom: 20px; }
    .head h1 {
      font-size: 22px;
      margin-bottom: 6px;
      background: linear-gradient(90deg, #38bdf8, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tag {
      display: inline-block;
      background: rgba(56, 189, 248, 0.15);
      color: #38bdf8;
      padding: 4px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid rgba(56, 189, 248, 0.3);
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 14px 16px;
    }
    .card-label {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .card-body {
      font-size: 12.5px;
      line-height: 1.7;
      color: #cbd5e1;
      font-family: Consolas, monospace;
    }
    .card-body b { color: #f1f5f9; font-weight: 700; }
    .ua {
      font-size: 10px;
      color: #64748b;
      margin-top: 6px;
      word-break: break-all;
    }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-ali { background: rgba(251,191,36,0.2); color: #fbbf24; }
    .badge-wv  { background: rgba(34,197,94,0.2); color: #4ade80; }
    .reason {
      margin-top: 8px;
      padding: 8px;
      background: rgba(167,139,250,0.08);
      border-radius: 6px;
      font-size: 11.5px;
      color: #c4b5fd;
      line-height: 1.5;
    }
    .muted { color: #64748b; }

    .player-wrap {
      position: relative;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      margin-bottom: 16px;
    }
    #player { width: 100% !important; height: 100% !important; }
    .status {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 12px;
      color: white;
      background: rgba(0,0,0,0.65);
      padding: 20px;
      text-align: center;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: #38bdf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err-icon { font-size: 40px; }
    .err-title { font-size: 18px; font-weight: 800; color: #f87171; }
    .err-detail { font-size: 12px; opacity: 0.85; max-width: 500px; word-break: break-all; }
    .logs {
      background: #000;
      border: 1px solid rgba(74,222,128,0.15);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 16px;
    }
    .logs h3 {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .log-list {
      max-height: 260px;
      overflow-y: auto;
      font-family: Consolas, monospace;
      font-size: 11.5px;
      line-height: 1.6;
    }
    .log-line { padding: 2px 0; }
    .log-time { color: #64748b; margin-right: 8px; }
    .log-info { color: #cbd5e1; }
    .log-success { color: #4ade80; }
    .log-warn { color: #fbbf24; }
    .log-error { color: #f87171; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h1>🎯 Player Serve — Auto Select</h1>
      <div class="tag">1 Video ID · Backend เลือก Ali Prop / Widevine ให้อัตโนมัติ</div>
      <div style="margin-top:8px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
        <button onclick="checkStatus()" style="background:rgba(56,189,248,0.15);color:#38bdf8;border:1px solid rgba(56,189,248,0.3);padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">🔍 Status</button>
        <button onclick="deepDiagnose()" style="background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3);padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">🩺 Diagnose</button>
        <button onclick="reloadPlayer()" style="background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3);padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">🔄 Reload</button>
        <button onclick="sendLogsToDev()" style="background:rgba(74,222,128,0.2);color:#4ade80;border:1px solid rgba(74,222,128,0.5);padding:8px 18px;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;font-family:inherit">📤 ส่ง Logs ให้ Dev</button>
      </div>
    </div>

    <div class="cards">
      <div class="card">
        <div class="card-label">Your Device</div>
        <div class="card-body" id="device-info">detecting...</div>
      </div>
      <div class="card">
        <div class="card-label">Backend Served</div>
        <div class="card-body" id="serve-info"><div class="muted">รอ backend response...</div></div>
      </div>
    </div>

    <div class="player-wrap">
      <div id="player"></div>
      <div class="status" id="status">
        <div class="spinner"></div>
        <div>กำลังโหลด...</div>
      </div>
    </div>

    <div class="logs">
      <h3>📝 Debug Logs (<span id="log-count">0</span>)</h3>
      <div class="log-list" id="log-list"></div>
    </div>
  </div>

  <!-- ⭐ v2.35.4 = ground truth (verified iOS จีนเล่นได้)
       v2.15.4 (aliplayer.js) พัง iOS จีน = fetch g.alicdn.com/splayer runtime → GFW block -->
  <link rel="stylesheet" href="/vendor/aliplayer/aliplayer-2.35.4.css">
  <script src="/vendor/aliplayer/aliplayer-2.35.4.js"></script>
  <script>
    const VIDEO_ID = '00bef48a7d1071f18224e6f6c55a0102'
    const SERVE_ENDPOINT = `/api/china/test-serve/${VIDEO_ID}`
    const STATUS_ENDPOINT = `/api/china/test-status/${VIDEO_ID}`
    const PLAYINFO_ENDPOINT = `/api/china/test-playinfo/${VIDEO_ID}`

    let currentPlayer = null
    let waitingSince = null
    let watchdogTimer = null
    let retryCount = 0
    const MAX_RETRY = 3

    const logs = []
    function log(msg, type = 'info') {
      const time = new Date().toTimeString().slice(0, 8)
      logs.push({ time, msg, type })
      const html = logs.map(l =>
        `<div class="log-line log-${l.type}"><span class="log-time">[${l.time}]</span>${escapeHtml(l.msg)}</div>`
      ).join('')
      document.getElementById('log-list').innerHTML = html
      document.getElementById('log-count').textContent = logs.length
      console.log(`[${time}] ${msg}`)
    }
    function escapeHtml(s) {
      return String(s).replace(/[<>&"]/g, c => ({ '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;' }[c]))
    }
    function hideStatus() { document.getElementById('status').style.display = 'none' }
    function showError(title, detail) {
      document.getElementById('status').innerHTML =
        `<div class="err-icon">⚠️</div><div class="err-title">${escapeHtml(title)}</div><div class="err-detail">${escapeHtml(detail)}</div>`
      document.getElementById('status').style.display = 'grid'
    }

    // ⭐ Frontend detect โดยใช้ TOUCH POINT เป็นตัวหลัก
    // เหตุผล: Mac จริง = maxTouchPoints === 0, iPad/iPhone = > 0 เสมอ
    // Windows touch laptop ก็มี > 0 แต่ UA จะไม่ใช่ Mac/Safari
    function detectIOS() {
      const ua = navigator.userAgent
      const touch = navigator.maxTouchPoints || 0

      // Rule 1: UA ตรงเลย (iPhone/iPod/iPad เก่า + Chrome iOS)
      if (/iPad|iPhone|iPod|CriOS|FxiOS/.test(ua)) return true

      // Rule 2: TOUCH POINT + Apple-like environment = iPad iOS 13+
      // Mac จริง touch = 0 → ถ้า > 0 = ไม่ใช่ Mac แล้ว
      if (touch > 0) {
        // Safari + Mac-like UA + มี touch = iPad iOS 13+ (ปลอมตัว)
        if (/Safari/.test(ua) && /Mac/.test(ua) && !/Chrome/.test(ua)) return true
        // iPad บาง Chrome iOS อาจไม่มี CriOS แต่มี touch + MacIntel
        if (navigator.platform === 'MacIntel') return true
      }

      // Rule 3: userAgentData (Chrome-based สมัยใหม่)
      if (navigator.userAgentData && navigator.userAgentData.platform === 'iOS') return true

      return false
    }

    function renderDevice() {
      const ua = navigator.userAgent
      const isIOS = detectIOS()
      const touch = navigator.maxTouchPoints || 0
      const touchBadge = touch > 0 ? '📱 has touch' : '💻 no touch'
      document.getElementById('device-info').innerHTML = `
        <div><b>iOS Detect:</b> ${isIOS ? '✅ iOS' : '❌ Not iOS'}</div>
        <div><b>Touch Points:</b> ${touch} <span style="color:${touch>0?'#4ade80':'#94a3b8'}">(${touchBadge})</span></div>
        <div><b>Platform:</b> ${navigator.platform}</div>
        <div><b>UA Data Platform:</b> ${navigator.userAgentData?.platform || 'n/a'}</div>
        <div class="ua">${escapeHtml(ua)}</div>
      `
    }

    function renderServe(data) {
      const mode = data.mode === 'ali' ? 'Ali Prop' : 'Widevine DRM'
      const badge = data.mode === 'ali' ? 'badge-ali' : 'badge-wv'
      document.getElementById('serve-info').innerHTML = `
        <div><b>Mode:</b> <span class="badge ${badge}">${mode}</span></div>
        <div><b>Auth Type:</b> ${data.authType}</div>
        <div><b>encryptType:</b> ${data.encryptType}</div>
        <div><b>Device Detect:</b> ${data.deviceServed}</div>
        <div class="reason">💡 ${data.reason}</div>
      `
    }

    async function fetchServe() {
      // ⭐ Cache-bust: fresh serve endpoint ทุกครั้ง (browser + CDN)
      const bust = Date.now() + '-' + Math.random().toString(36).substring(2, 8)
      const url = `${SERVE_ENDPOINT}?_=${bust}`
      log(`Fetch: ${url}`, 'info')
      const headers = {
        'Cache-Control': 'no-cache, no-store, must-revalidate',
        'Pragma': 'no-cache'
      }
      if (detectIOS()) headers['X-MN-Device'] = 'ios'

      const res = await fetch(url, {
        headers,
        cache: 'no-store',           // browser ต้อง fetch ไม่ใช่จาก cache
        credentials: 'omit'
      })
      if (!res.ok) throw new Error(`Serve fail ${res.status}: ${(await res.text()).substring(0, 200)}`)
      const data = await res.json()
      _lastServe = { mode: data.mode, authType: data.authType, encryptType: data.encryptType, deviceServed: data.deviceServed, expiration: data.expiration, stsPrefix: data.accessKeyId?.substring(0,10) }
      log(`Backend mode=${data.mode} authType=${data.authType} encryptType=${data.encryptType} sts=${data.accessKeyId?.substring(0,10)}...`, 'success')
      log(`STS expires: ${data.expiration}`, 'info')
      log(`Reason: ${data.reason}`, 'info')
      renderServe(data)
      return data
    }

    function waitAli(t = 15000) {
      return new Promise((resolve, reject) => {
        const s = Date.now()
        const i = setInterval(() => {
          if (window.Aliplayer) { clearInterval(i); resolve() }
          else if (Date.now() - s > t) { clearInterval(i); reject(new Error('SDK timeout')) }
        }, 200)
      })
    }

    // ⭐ Watchdog — waiting > 10s → auto-reload player
    function startWatchdog() {
      if (watchdogTimer) clearInterval(watchdogTimer)
      watchdogTimer = setInterval(() => {
        if (!waitingSince) return
        const elapsed = Date.now() - waitingSince
        if (elapsed > 10000 && retryCount < MAX_RETRY) {
          log(`⚠️ Buffering ${Math.round(elapsed/1000)}s → auto-reload (retry ${retryCount + 1}/${MAX_RETRY})`, 'warn')
          waitingSince = null
          retryCount++
          reloadPlayer()
        } else if (elapsed > 10000 && retryCount >= MAX_RETRY) {
          log(`❌ Buffering เกิน retry limit (${MAX_RETRY}) → หยุด — ลอง Query Video Status ดู`, 'error')
          waitingSince = null
        }
      }, 2000)
    }

    async function reloadPlayer() {
      log('🔄 Reloading player...', 'warn')
      waitingSince = null
      if (currentPlayer) {
        try { currentPlayer.pause() } catch {}
        try { currentPlayer.dispose() } catch {}
        currentPlayer = null
      }
      // ⭐ ลบ DOM element เดิมทิ้งทั้งชิ้น + สร้างใหม่ (Aliplayer internal state ค้าง)
      const oldPlayer = document.getElementById('player')
      if (oldPlayer && oldPlayer.parentNode) {
        const newPlayer = document.createElement('div')
        newPlayer.id = 'player'
        oldPlayer.parentNode.replaceChild(newPlayer, oldPlayer)
      }
      document.getElementById('status').style.display = 'grid'
      document.getElementById('status').innerHTML = `<div class="spinner"></div><div>กำลัง reload (retry ${retryCount})...</div>`
      // รอ DOM settle นิดก่อน init ใหม่
      await new Promise(r => setTimeout(r, 200))
      await init()
    }

    let _lastServe = null // เก็บ serve response ไว้ upload ด้วย

    async function sendLogsToDev() {
      const btn = event?.target
      const orig = btn ? btn.textContent : ''
      if (btn) btn.textContent = '⏳ กำลังส่ง...'
      try {
        // Auto-run diagnose ก่อนส่ง — ให้ dev เห็นสถานะ Alibaba ล่าสุด
        log('📤 ส่ง logs ให้ dev...', 'info')
        try { await deepDiagnose() } catch {}

        const device = {
          ua: navigator.userAgent,
          isIOS: detectIOS(),
          platform: navigator.platform,
          touch: navigator.maxTouchPoints,
          uaPlatform: navigator.userAgentData?.platform || null
        }
        const res = await fetch('/api/china/test-logs-upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            device,
            serveInfo: _lastServe,
            logs
          })
        })
        if (!res.ok) throw new Error(`Upload fail ${res.status}`)
        const data = await res.json()
        log(`✅ ส่งแล้ว! session id=${data.id} — บอก dev มาดูได้เลย`, 'success')
        if (btn) {
          btn.textContent = '✅ ส่งแล้ว!'
          btn.style.background = 'rgba(74,222,128,0.4)'
          setTimeout(() => {
            btn.textContent = orig
            btn.style.background = 'rgba(74,222,128,0.2)'
          }, 3000)
        }
      } catch (err) {
        log(`❌ ส่งไม่สำเร็จ: ${err.message}`, 'error')
        if (btn) {
          btn.textContent = '❌ Error'
          setTimeout(() => btn.textContent = orig, 3000)
        }
      }
    }

    async function deepDiagnose() {
      log('🩺 Deep diagnose — backend เรียก Alibaba ตรง (bypass browser)...', 'warn')
      try {
        const bust = Date.now()
        const res = await fetch(`/api/china/test-diagnose/${VIDEO_ID}?_=${bust}`, { cache: 'no-store' })
        const data = await res.json()
        log(`Trace: ${data.traceId} @ ${data.ts}`, 'info')
        data.results.forEach(r => {
          const icon = r.ok ? '✅' : '❌'
          const type = r.ok ? 'success' : 'error'
          let msg = `${icon} ${r.step} (${r.ms}ms)`
          if (r.status) msg += ` status=${r.status}`
          if (r.streamCount != null) msg += ` streams=${r.streamCount}`
          if (r.httpStatus) msg += ` http=${r.httpStatus}`
          if (r.error) msg += ` error=${r.error}${r.code?' code='+r.code:''}`
          log(msg, type)
          if (r.streams) r.streams.forEach((s, i) => log(`   [${i}] ${s.format}/${s.def} enc=${s.encType||'none'} host=${s.urlHost}`, 'info'))
          if (r.url) log(`   url=${r.url}`, 'info')
        })
      } catch (err) {
        log(`Diagnose ERROR: ${err.message}`, 'error')
      }
    }

    async function checkStatus() {
      log('🔍 Query video status จาก Alibaba...', 'info')
      try {
        const res = await fetch(STATUS_ENDPOINT)
        if (!res.ok) throw new Error(`Status fail ${res.status}: ${(await res.text()).substring(0,200)}`)
        const data = await res.json()
        log(`Video status: ${data.status} · duration: ${data.duration}s · streams: ${data.streamCount}`, 'success')
        data.streams.forEach((s, i) => {
          log(`  Stream ${i+1}: ${s.format} · ${s.definition} · encrypt=${s.encryptType || 'none'} · bitrate=${s.bitrate}`, 'info')
          log(`    host=${s.playUrlHost} expire=${s.urlExpireHint || 'n/a'}`, 'info')
        })
      } catch (err) {
        log(`Status ERROR: ${err.message}`, 'error')
      }
    }

    // ⭐ Intercept fetch — log ทุก network call (segment URL detect)
    const _origFetch = window.fetch
    window.fetch = async function(url, opts) {
      const urlStr = typeof url === 'string' ? url : url.url
      const isSegment = /\.(ts|m4s|mp4|m3u8|mpd)($|\?)/i.test(urlStr)
      const isAli = /aliyuncs|alicdn|medninja\.academy\/\w+\.(ts|m4s|m3u8|mp4|mpd)/i.test(urlStr)

      if (isSegment || isAli) {
        const startMs = Date.now()
        try {
          const r = await _origFetch(url, opts)
          const ms = Date.now() - startMs
          const kind = urlStr.includes('.m3u8') ? 'manifest' : urlStr.includes('.mpd') ? 'dash' : 'segment'
          if (!r.ok) {
            log(`❌ ${kind} ${r.status} (${ms}ms): ${urlStr.substring(urlStr.lastIndexOf('/')+1, urlStr.indexOf('?')<0?urlStr.length:urlStr.indexOf('?')).substring(0,40)}`, 'error')
          } else if (kind === 'manifest') {
            log(`✅ manifest ${r.status} (${ms}ms)`, 'success')
          }
          return r
        } catch (e) {
          log(`❌ ${urlStr.substring(urlStr.lastIndexOf('/')+1,30)}: ${e.message}`, 'error')
          throw e
        }
      }
      return _origFetch(url, opts)
    }

    async function init() {
      try {
        renderDevice()
        log('เริ่มทำงาน', 'info')
        const iosDetected = detectIOS()
        log(`Frontend iOS detect: ${iosDetected}`, 'info')

        await waitAli()
        log('Aliplayer SDK พร้อม', 'success')

        // ⭐ Step 1: fetch PlayInfo → เลือก stream URL ตาม device (backend proxy)
        log(`Fetch PlayInfo (proxy): ${PLAYINFO_ENDPOINT}`, 'info')
        const piBust = Date.now() + '-' + Math.random().toString(36).substring(2, 8)
        const piRes = await fetch(`${PLAYINFO_ENDPOINT}?_=${piBust}`, { cache: 'no-store' })
        if (!piRes.ok) throw new Error(`PlayInfo fail ${piRes.status}: ${(await piRes.text()).substring(0, 200)}`)
        const playInfo = await piRes.json()
        log(`PlayInfo streams: ${playInfo.streams.length}`, 'success')
        playInfo.streams.forEach((s, i) => log(`  [${i}] ${s.format}/${s.definition} enc=${s.encryptType} bitrate=${s.bitrate}`, 'info'))

        // ⭐ Step 2: เลือก stream ที่เหมาะกับ device
        // iOS = AliyunVoDEncryption (Ali Prop m3u8)
        // Other = Widevine-FairPlay (Widevine m3u8/mpd)
        let chosen
        if (iosDetected) {
          chosen = playInfo.streams.find(s => s.encryptType === 'AliyunVoDEncryption')
        } else {
          chosen = playInfo.streams.find(s => s.encryptType === 'Widevine-FairPlay')
                || playInfo.streams.find(s => s.encryptType === 'AliyunVoDEncryption')
        }
        if (!chosen) throw new Error(`ไม่พบ stream ที่เหมาะกับ device (iOS=${iosDetected})`)
        log(`✅ Chosen: ${chosen.format}/${chosen.definition} enc=${chosen.encryptType}`, 'success')
        log(`   URL: ${chosen.playUrl.substring(0, 100)}...`, 'info')

        // ⭐ Step 3: fetch STS (สำหรับ DRM license — Widevine ต้องมี)
        const serve = await fetchServe()

        // ⭐ Step 4: Config Aliplayer ด้วย SOURCE (URL ตรง) แทน vid
        //   = Aliplayer ไม่ต้องเรียก Alibaba VOD API เอง = bypass decision layer
        const config = {
          id: 'player',
          source: chosen.playUrl,      // ← ใช้ URL ตรง แทน vid
          width: '100%',
          height: '100%',
          autoplay: false,
          isLive: false,
          rePlay: false,
          playsinline: true,
          preload: true,
          controlBarVisibility: 'hover',
          useH5Prism: true,
          license: {
            domain: 'passport.medninja.academy',
            key: 'vPC0n17ZWmwsoyeP9659f501b25944c10903c73d068157faa'
          },
          encryptType: serve.encryptType,
          // STS สำหรับ DRM license (แม้ใช้ source แต่ Widevine ยังต้อง STS ขอ license key)
          accessKeyId: serve.accessKeyId,
          accessKeySecret: serve.accessKeySecret,
          securityToken: serve.securityToken,
          region: serve.region
        }
        log(`Config: source URL mode (${iosDetected ? 'Ali Prop iOS' : 'Widevine DRM'})`, 'info')

        log('สร้าง Aliplayer instance...', 'info')
        const player = new window.Aliplayer(config, function () {
          log('Player instance สร้างสำเร็จ', 'success')
          hideStatus()
        })
        currentPlayer = player
        startWatchdog()

        // ⭐ Progress diagnostic — เช็ค video.currentTime + buffered ทุก 2 วิ
        const diagTimer = setInterval(() => {
          const vid = document.querySelector('#player video')
          if (!vid) return
          const ct = vid.currentTime.toFixed(2)
          const dur = vid.duration ? vid.duration.toFixed(2) : '?'
          const ns = vid.networkState
          const rs = vid.readyState
          let buf = ''
          try {
            for (let i = 0; i < vid.buffered.length; i++) {
              buf += `[${vid.buffered.start(i).toFixed(1)}-${vid.buffered.end(i).toFixed(1)}]`
            }
          } catch {}
          log(`📊 t=${ct}/${dur}s netState=${ns} readyState=${rs} buffered=${buf || 'empty'}`, 'info')
          // stop diagnostic ถ้าเล่นจริงแล้ว
          if (!vid.paused && rs >= 3) {
            clearInterval(diagTimer)
          }
        }, 2000)

        player.on('ready', () => log('Event: ready', 'info'))
        player.on('startBuffering', () => log('Event: startBuffering', 'warn'))
        player.on('endBuffering', () => log('Event: endBuffering', 'success'))
        player.on('firstFrameShow', () => log('Event: firstFrameShow', 'success'))
        player.on('requestFullScreen', () => log('Event: requestFullScreen', 'info'))
        player.on('cancelFullScreen', () => log('Event: cancelFullScreen', 'info'))
        player.on('liveStreamStop', () => log('Event: liveStreamStop', 'warn'))
        player.on('m3u8Retry', (e) => log(`Event: m3u8Retry ${JSON.stringify(e)}`, 'warn'))
        player.on('hideBar', () => log('Event: hideBar', 'info'))
        player.on('showBar', () => log('Event: showBar', 'info'))
        player.on('play', () => {
          log('Event: play', 'success')
          waitingSince = null
        })
        player.on('playing', () => {
          log('Event: playing (เล่นจริง!)', 'success')
          waitingSince = null
          retryCount = 0 // เล่นได้แล้ว reset retry
        })
        player.on('canplay', () => {
          log('Event: canplay (พร้อมเล่น)', 'success')
          waitingSince = null
        })
        player.on('waiting', () => {
          log('Event: waiting (buffering) ⏳', 'warn')
          waitingSince = Date.now()
        })
        player.on('pause', () => log('Event: pause', 'warn'))
        player.on('ended', () => log('Event: ended', 'info'))
        player.on('error', (e) => {
          const d = e && e.paramData ? JSON.stringify(e.paramData) : (e && e.message) || 'unknown'
          log(`ERROR: ${d}`, 'error')
          waitingSince = null
          if (retryCount < MAX_RETRY) {
            log(`🔄 Auto-retry (${retryCount+1}/${MAX_RETRY}) ใน 2 วินาที...`, 'warn')
            retryCount++
            setTimeout(() => reloadPlayer(), 2000)
          } else {
            showError('เล่นวิดีโอไม่ได้ (retry limit)', d)
          }
        })
      } catch (err) {
        log(`Init error: ${err.message}`, 'error')
        showError('เกิดข้อผิดพลาด', err.message)
      }
    }
    init()
  </script>
</body>
</html>
