    <!-- ห้าม cache index.html ที่ระดับ browser (defense in depth) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- ⭐ Critical: บังคับ /my และ /live ให้ใช้ version ล่าสุดเสมอ
         รัน inline (ก่อน Vue โหลด) → ถ้า version mismatch = hard reload
         กันได้แม้ JS bundle เป็น cache เก่า เพราะเช็คก่อนโหลด bundle -->
    <script>
      (function () {
        var path = location.pathname;
        // เช็คเฉพาะหน้าที่ critical: /my, /live (ไม่รวม /my/watch/ ที่ดู VDO อยู่)
        var needsCheck = (path === '/my' || path.indexOf('/my/') === 0 || path.indexOf('/live/') === 0)
          && path.indexOf('/my/watch/') !== 0;
        if (!needsCheck) return;
        // กัน loop: ถ้าเพิ่ง reload (< 10 วิ) ข้าม
        var lastReload = sessionStorage.getItem('_inline_vr');
        var now = Date.now();
        if (lastReload && now - Number(lastReload) < 10000) return;
        try {
          var xhr = new XMLHttpRequest();
          xhr.open('GET', '/api/version?_=' + now, false); // sync (ก่อน Vue load)
          xhr.setRequestHeader('Cache-Control', 'no-cache');
          xhr.setRequestHeader('Pragma', 'no-cache');
          xhr.send();
          if (xhr.status === 200) {
            var serverVersion = JSON.parse(xhr.responseText).version;
            var storedVersion = localStorage.getItem('_app_version');
            if (storedVersion && serverVersion !== storedVersion) {
              // version เก่า! → reload + เก็บ version ใหม่
              localStorage.setItem('_app_version', serverVersion);
              sessionStorage.setItem('_inline_vr', String(now));
              var sep = location.search ? '&' : '?';
              location.replace(location.pathname + location.search + sep + '_v=' + now);
              return;
            }
            // เก็บ version ปัจจุบัน (กรณีเข้าครั้งแรก)
            if (!storedVersion) localStorage.setItem('_app_version', serverVersion);
          }
        } catch (e) { /* network fail = ปล่อยให้ใช้ cache */ }
      })();
    </script>
