<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <!-- ห้าม cache index.html ที่ระดับ browser (defense in depth) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- ⭐ Critical: บังคับ /my และ /live ให้ใช้ version ล่าสุดเสมอ
         รัน inline (ก่อน Vue โหลด) → ถ้า version mismatch = hard reload
         กันได้แม้ JS bundle เป็น cache เก่า เพราะเช็คก่อนโหลด bundle -->
    <script>
      (function () {
        var path = location.pathname;
        // เช็คเฉพาะหน้าที่ critical: /my, /live (ไม่รวม /my/watch/ ที่ดู VDO อยู่)
        var needsCheck = (path === '/my' || path.indexOf('/my/') === 0 || path.indexOf('/live/') === 0)
          && path.indexOf('/my/watch/') !== 0;
        if (!needsCheck) return;
        // กัน loop: ถ้าเพิ่ง reload (< 10 วิ) ข้าม
        var lastReload = sessionStorage.getItem('_inline_vr');
        var now = Date.now();
        if (lastReload && now - Number(lastReload) < 10000) return;
        try {
          var xhr = new XMLHttpRequest();
          xhr.open('GET', '/api/version?_=' + now, false); // sync (ก่อน Vue load)
          xhr.setRequestHeader('Cache-Control', 'no-cache');
          xhr.setRequestHeader('Pragma', 'no-cache');
          xhr.send();
          if (xhr.status === 200) {
            var serverVersion = JSON.parse(xhr.responseText).version;
            var storedVersion = localStorage.getItem('_app_version');
            if (storedVersion && serverVersion !== storedVersion) {
              // version เก่า! → reload + เก็บ version ใหม่
              localStorage.setItem('_app_version', serverVersion);
              sessionStorage.setItem('_inline_vr', String(now));
              var sep = location.search ? '&' : '?';
              location.replace(location.pathname + location.search + sep + '_v=' + now);
              return;
            }
            // เก็บ version ปัจจุบัน (กรณีเข้าครั้งแรก)
            if (!storedVersion) localStorage.setItem('_app_version', serverVersion);
          }
        } catch (e) { /* network fail = ปล่อยให้ใช้ cache */ }
      })();
    </script>
    <!-- ═══ Watch Debug Tracer ═══
         inline ที่ head → run ก่อน Vue โหลด → ทำงานได้แม้ main thread ค้าง
         ยิง event ผ่าน sendBeacon (bg thread) + fallback img pixel -->
    <script>
      (function () {
        // ทำงานเฉพาะ /my/watch หรือ /my-cn/watch (ประหยัด traffic)
        if (!/\/watch\//.test(location.pathname)) return;
        var SID = 'w_' + Math.random().toString(36).slice(2, 10) + '_' + Date.now();
        var t0 = Date.now();
        var buffer = [];
        var FLUSH_MS = 1000;

        function trace(type, data) {
          try {
            buffer.push({ t: Date.now() - t0, type: type, data: data || null });
            if (buffer.length >= 20) flush();
          } catch (e) {}
        }
        window.__wdbg = trace;  // expose สำหรับให้ Vue เรียก
        window.__wdbg_sid = SID;

        function flush() {
          if (buffer.length === 0) return;
          var events = buffer.splice(0, buffer.length);
          var payload = JSON.stringify({
            sessionId: SID,
            route: location.pathname,
            events: events
          });
          try {
            if (navigator.sendBeacon) {
              var blob = new Blob([payload], { type: 'text/plain' });
              navigator.sendBeacon('/api/debug/watch-trace', blob);
              return;
            }
          } catch (e) {}
          // Fallback: image beacon (1 event at a time)
          events.forEach(function (ev) {
            var url = '/api/debug/watch-beacon?sid=' + encodeURIComponent(SID)
                    + '&t=' + ev.t
                    + '&type=' + encodeURIComponent(ev.type)
                    + (ev.data ? '&data=' + encodeURIComponent(JSON.stringify(ev.data)) : '');
            var img = new Image();
            img.src = url;
          });
        }
        // Auto-flush every 1s
        setInterval(flush, FLUSH_MS);
        // Flush ก่อนออกจากหน้า
        window.addEventListener('pagehide', flush);
        window.addEventListener('beforeunload', flush);

        // ═══ Startup events ═══
        trace('boot', {
          ua: navigator.userAgent,
          platform: navigator.platform,
          maxTouch: navigator.maxTouchPoints,
          online: navigator.onLine,
          connType: (navigator.connection && navigator.connection.effectiveType) || null,
          lang: navigator.language,
          vw: window.innerWidth,
          vh: window.innerHeight
        });

        // ═══ Track resource load errors (Aliplayer SDK, Bunny embed) ═══
        window.addEventListener('error', function (e) {
          trace('error', {
            msg: (e.message || '').slice(0, 200),
            src: e.filename || (e.target && e.target.src) || '',
            line: e.lineno,
            col: e.colno,
            tag: e.target && e.target.tagName
          });
        }, true);
        window.addEventListener('unhandledrejection', function (e) {
          trace('promise_reject', {
            reason: String(e.reason || '').slice(0, 200)
          });
        });

        // ═══ Track network fetches (fetch + XHR) ═══
        var origFetch = window.fetch;
        if (origFetch) {
          window.fetch = function (input, init) {
            var url = (typeof input === 'string' ? input : input.url) || '';
            // Skip self (avoid infinite loop)
            if (url.indexOf('/api/debug/watch-') === 0) return origFetch.apply(this, arguments);
            var startT = Date.now() - t0;
            trace('fetch_start', { url: url.slice(0, 150) });
            return origFetch.apply(this, arguments).then(function (r) {
              trace('fetch_ok', { url: url.slice(0, 150), status: r.status, dur: (Date.now() - t0) - startT });
              return r;
            }).catch(function (err) {
              trace('fetch_err', { url: url.slice(0, 150), msg: String(err.message || err).slice(0, 150) });
              throw err;
            });
          };
        }

        // ═══ Freeze detector: main thread heartbeat ═══
        // ถ้า setTimeout callback ช้า > 1500ms = main thread block
        var lastBeat = Date.now();
        setInterval(function () {
          var now = Date.now();
          var lag = now - lastBeat - 500;
          if (lag > 1500) {
            // trace via inline (buffer อาจ full — ใช้ direct beacon)
            try {
              if (navigator.sendBeacon) {
                var p = JSON.stringify({
                  sessionId: SID,
                  route: location.pathname,
                  events: [{ t: now - t0, type: 'freeze', data: { lagMs: lag } }]
                });
                navigator.sendBeacon('/api/debug/watch-trace', new Blob([p], { type: 'text/plain' }));
              }
            } catch (e) {}
          }
          lastBeat = now;
        }, 500);

        // ═══ Track DOM lifecycle ═══
        document.addEventListener('DOMContentLoaded', function () { trace('dom_ready'); });
        window.addEventListener('load', function () { trace('window_load'); });

        // ═══ Track script load (Aliplayer, Bunny playerjs) ═══
        var observer = new MutationObserver(function (muts) {
          muts.forEach(function (m) {
            m.addedNodes.forEach(function (n) {
              if (n.tagName === 'SCRIPT' && n.src) {
                var src = n.src.slice(0, 100);
                trace('script_added', { src: src });
                n.addEventListener('load', function () { trace('script_load', { src: src }); });
                n.addEventListener('error', function () { trace('script_err', { src: src }); });
              }
              if (n.tagName === 'IFRAME' && n.src) {
                var isrc = n.src.slice(0, 100);
                trace('iframe_added', { src: isrc });
                n.addEventListener('load', function () { trace('iframe_load', { src: isrc }); });
                n.addEventListener('error', function () { trace('iframe_err', { src: isrc }); });
              }
            });
          });
        });
        try { observer.observe(document.documentElement, { childList: true, subtree: true }); } catch (e) {}
      })();
    </script>

    <!-- ⚠️ Google Fonts + Bunny preconnect ย้ายไปโหลด lazy หลัง Vue mount -->
    <!-- เพราะ GFW บล็อก fonts.googleapis.com + mediadelivery.net → iOS Safari ค้างจอขาวรอ timeout 60-90s -->
    <!-- ใช้ system font fallback ใน main.css แทน (ดี iOS/Android/Windows/Mac ทุก platform) -->
    <script>
      (function () {
        // โหลด Google Fonts + Bunny preconnect หลัง window.load เท่านั้น
        // → ถ้าโดนบล็อก (GFW) จะไม่ block first paint
        function lazyLoad () {
          try {
            var f = document.createElement('link');
            f.rel = 'stylesheet';
            f.href = 'https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap';
            document.head.appendChild(f);
          } catch (e) {}
          // Bunny preconnect เฉพาะเมื่ออยู่หน้า /my/watch หรือ /live
          if (/\/watch\/|\/live\//.test(location.pathname)) {
            try {
              ['assets.mediadelivery.net', 'player.mediadelivery.net'].forEach(function (h) {
                var p = document.createElement('link');
                p.rel = 'preconnect'; p.href = 'https://' + h; p.crossOrigin = 'anonymous';
                document.head.appendChild(p);
              });
            } catch (e) {}
          }
        }
        if (document.readyState === 'complete') lazyLoad();
        else window.addEventListener('load', lazyLoad);
      })();
    </script>
