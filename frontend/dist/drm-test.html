<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="x-ua-compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
  <title>MedNinja DRM Test</title>
  <!-- BUILD_VERSION: 2026-07-07-14:45-v18-null-check-fix -->
  <meta name="build-version" content="v18 · 14:45">

  <!-- Aliplayer SDK 2.35.4 - Self-host (Server เรา) + fallback CDN Alibaba -->
  <!-- ทดสอบ Cache Theory ยืนยันแล้ว: g.alicdn.com ช้ามากจาก network ไทย/มือถือ -->
  <!-- แก้: self-host จาก server เรา (โหลดเร็ว + reliable ทุก location) -->
  <link rel="stylesheet" href="/vendor/aliplayer/aliplayer-2.35.4.css" />
  <script src="/vendor/aliplayer/aliplayer-2.35.4.js" onerror="loadFallbackSDK()"></script>
  <script>
    // Fallback: ถ้า self-host โหลดไม่ได้ → ลอง CDN Alibaba
    function loadFallbackSDK() {
      console.warn('[MedNinja] Self-host SDK failed, fallback to g.alicdn.com');
      var css = document.createElement('link');
      css.rel = 'stylesheet';
      css.href = '//g.alicdn.com/apsara-media-box/imp-web-player/2.35.4/skins/default/aliplayer-min.css';
      document.head.appendChild(css);
      var s = document.createElement('script');
      s.src = '//g.alicdn.com/apsara-media-box/imp-web-player/2.35.4/aliplayer-min.js';
      document.head.appendChild(s);
    }
  </script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: linear-gradient(135deg, #1a0033 0%, #0f172a 100%);
      color: #f1f5f9;
      padding: 16px;
    }
    h1 { font-size: 22px; color: #a855f7; margin-bottom: 4px; }
    .sub { color: #94a3b8; font-size: 13px; margin-bottom: 12px; }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      background: #a855f7;
      color: white;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
      margin-right: 6px;
    }
    .version-badge {
      background: #4ade80;
      color: #052e16;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
      font-family: monospace;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    .info {
      background: rgba(168, 85, 247, 0.1);
      border: 1px solid rgba(168, 85, 247, 0.3);
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 12px;
      word-break: break-all;
    }
    .info b { color: #c4b5fd; }
    .info .cn { color: #ef4444; font-weight: bold; }
    .info .th { color: #3b82f6; font-weight: bold; }
    .player-box {
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 12px;
      max-width: 720px;
    }
    #J_prismPlayer { width: 100%; min-height: 300px; }
    #log {
      background: #000;
      border: 1px solid rgba(74,222,128,0.2);
      border-radius: 8px;
      padding: 12px;
      font-family: 'Consolas', monospace;
      font-size: 11px;
      max-height: 400px;
      overflow-y: auto;
      color: #4ade80;
    }
    #log .err { color: #f87171; }
    #log .warn { color: #fbbf24; }
    #log .info { color: #38bdf8; }
    #log .success { color: #4ade80; font-weight: bold; }
    button {
      background: #a855f7;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      margin: 8px 4px;
      font-weight: bold;
    }
    button.reload-btn {
      background: #64748b;
      padding: 4px 10px;
      font-size: 11px;
      margin: 0;
    }
    button.list-btn { background: #22c55e; }
    .video-input {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      max-width: 720px;
      flex-wrap: wrap;
    }
    .video-input input {
      flex: 1;
      min-width: 240px;
      padding: 12px 14px;
      background: rgba(168, 85, 247, 0.1);
      border: 1px solid rgba(168, 85, 247, 0.4);
      border-radius: 6px;
      color: #f1f5f9;
      font-family: 'Consolas', monospace;
      font-size: 13px;
    }
    .video-input button { margin: 0; }
    .quick-picks {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      font-size: 12px;
      color: #94a3b8;
    }
    .quick-picks .quick {
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.3);
      color: #4ade80;
      padding: 6px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-family: 'Consolas', monospace;
      font-size: 11px;
    }
    .quick-picks .quick:hover { background: rgba(74, 222, 128, 0.2); }
  </style>
</head>
<body>
  <div class="header-row">
    <h1>🔐 MedNinja DRM Test</h1>
    <div style="display: flex; gap: 6px; align-items: center;">
      <span class="version-badge" id="versionBadge">v18 · 14:45</span>
      <button class="reload-btn" onclick="location.reload(true)">🔄 Reload</button>
    </div>
  </div>

  <p class="sub">
    <span class="badge">Widevine</span>
    <span class="badge">FairPlay</span>
    Dual-DRM via Alibaba license server (mirror)
  </p>

  <div class="info">
    <b>Your IP:</b> <span id="ipAddr">...</span> ·
    <b>Country:</b> <span id="ipCountry">-</span><br>
    <b>Device:</b> <span id="devInfo">-</span><br>
    <b>Encryption:</b> Widevine-FairPlay DRM · <b>SDK:</b> Aliplayer 2.35.4 (self-host)<br>
    <b>License:</b> Activated (Chinese Mainland region)
  </div>

  <div class="video-input">
    <input id="vidInput" type="text" placeholder="กรอก Alibaba Video ID..." />
    <button onclick="loadDRM()">▶ Play DRM Video</button>
    <button class="list-btn" onclick="listVideos()">📋 List</button>
  </div>

  <div class="quick-picks" id="quickPicks">
    <span style="align-self: center; margin-right: 6px;">Quick:</span>
  </div>

  <div class="player-box">
    <div id="J_prismPlayer"></div>
  </div>

  <div id="log"></div>

  <script>
    const sessionId = 'drm-' + Math.random().toString(36).substring(2, 10);
    const logBuffer = [];
    let flushTimer = null;

    function flushLogs() {
      if (!logBuffer.length) return;
      const batch = logBuffer.splice(0, logBuffer.length);
      fetch('/api/china/log/batch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, entries: batch })
      }).catch(() => {});
    }

    const logEl = document.getElementById('log');
    function log(msg, type) {
      const line = document.createElement('div');
      line.className = type || '';
      line.textContent = '[' + new Date().toTimeString().slice(0,8) + '] ' + msg;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
      logBuffer.push({ level: type || 'info', msg, clientTs: new Date().toISOString() });
      if (flushTimer) clearTimeout(flushTimer);
      flushTimer = setTimeout(flushLogs, 500);
    }

    // Build version
    const buildVer = document.querySelector('meta[name="build-version"]').content;
    log('🏷️ Build: ' + buildVer, 'success');
    log('Session: ' + sessionId, 'info');
    log('UA: ' + navigator.userAgent.substring(0, 100), 'info');

    // Device info (simple, inline)
    function detectDevice() {
      const ua = navigator.userAgent;
      let dev = 'Desktop', browser = '?';
      if (/iPhone/.test(ua)) dev = '📱 iPhone';
      else if (/iPad/.test(ua)) dev = '📱 iPad';
      else if (/Android.*Mobile/.test(ua)) dev = '📱 Android';
      else if (/Windows/.test(ua)) dev = '💻 Windows';
      else if (/Macintosh/.test(ua)) dev = '💻 Mac';

      if (/Edg\/([\d.]+)/.exec(ua)) browser = 'Edge ' + RegExp.$1;
      else if (/Chrome\/([\d.]+)/.exec(ua)) browser = 'Chrome ' + RegExp.$1;
      else if (/Firefox\/([\d.]+)/.exec(ua)) browser = 'Firefox ' + RegExp.$1;
      else if (/Version\/([\d.]+).*Safari/.exec(ua)) browser = 'Safari ' + RegExp.$1;

      document.getElementById('devInfo').textContent = dev + ' · ' + browser;
      log('📱 ' + dev + ' · ' + browser, 'info');
    }
    detectDevice();

    // IP + Country (backend Cloudflare - fast)
    (async () => {
      try {
        const res = await fetch('/api/china/whoami');
        const data = await res.json();
        const flag = { CN: '🇨🇳', TH: '🇹🇭', HK: '🇭🇰', SG: '🇸🇬', US: '🇺🇸' }[data.country] || '🌐';
        document.getElementById('ipAddr').textContent = data.ip || '-';
        const countryEl = document.getElementById('ipCountry');
        countryEl.textContent = flag + ' ' + (data.country || '-');
        countryEl.className = data.country === 'CN' ? 'cn' : data.country === 'TH' ? 'th' : '';
        log('✅ IP: ' + data.ip + ' · ' + data.country, 'success');
      } catch (e) {
        log('⚠️ IP detect fail: ' + e.message, 'warn');
      }
    })();

    // Widevine capability check (auto)
    if (navigator.requestMediaKeySystemAccess) {
      log('✅ EME (Encrypted Media Extensions) supported', 'success');
      navigator.requestMediaKeySystemAccess('com.widevine.alpha', [{
        initDataTypes: ['cenc'],
        videoCapabilities: [{ contentType: 'video/mp4; codecs="avc1.42E01E"' }]
      }])
        .then(access => log('✅ Widevine CDM available', 'success'))
        .catch(e => log('⚠️ Widevine CDM error: ' + e.message, 'warn'));

      navigator.requestMediaKeySystemAccess('com.apple.fps.1_0', [{
        initDataTypes: ['sinf'],
        videoCapabilities: [{ contentType: 'video/mp4; codecs="avc1.42E01E"' }]
      }])
        .then(access => log('✅ FairPlay supported', 'success'))
        .catch(e => log('ℹ️ FairPlay ไม่รองรับ (ปกติ non-Apple)', 'info'));
    } else {
      log('❌ EME ไม่รองรับใน browser นี้', 'err');
    }

    // Wait for SDK (up to 30s) — ต้องเช็คว่าไม่ใช่ null (typeof null === 'object')
    const sdkStart = Date.now();
    const sdkPoll = setInterval(() => {
      const elapsed = Math.round((Date.now() - sdkStart) / 1000);
      // Get Aliplayer จากทุกแหล่ง
      let alp = null;
      try { alp = window.Aliplayer; } catch (e) {}
      if (!alp) { try { alp = (typeof Aliplayer !== 'undefined') ? Aliplayer : null; } catch (e) {} }
      if (!alp) { try { alp = (typeof globalThis !== 'undefined') ? globalThis.Aliplayer : null; } catch (e) {} }

      // ตรวจว่าเป็น non-null value ที่ใช้ new ได้ (function หรือ object callable)
      // typeof null === 'object' — ต้องกัน explicit
      const isReady = alp !== null && alp !== undefined &&
                      (typeof alp === 'function' ||
                       (typeof alp === 'object' && (typeof alp.default === 'function' || Object.keys(alp).length > 0)));

      if (isReady) {
        clearInterval(sdkPoll);
        // ถ้า Aliplayer เป็น { default: fn } (ES module wrap) — ใช้ default
        const finalAlp = (typeof alp === 'object' && typeof alp.default === 'function') ? alp.default : alp;
        window.Aliplayer = finalAlp;
        log('✅ Aliplayer พร้อม (' + elapsed + 's, type=' + typeof finalAlp + ', keys=' + (typeof finalAlp === 'object' ? Object.keys(finalAlp).length : 'N/A') + ')', 'success');
      } else if (elapsed >= 30) {
        clearInterval(sdkPoll);
        const dbgKeys = (alp && typeof alp === 'object') ? Object.keys(alp).slice(0, 5).join(',') : 'none';
        log('❌ Aliplayer timeout 30s (type=' + typeof alp + ', null=' + (alp === null) + ', keys=[' + dbgKeys + '])', 'err');
      } else if (elapsed % 5 === 0 && elapsed > 0) {
        const dbgKeys = (alp && typeof alp === 'object') ? Object.keys(alp).length : 'N/A';
        log('⏳ รอ Aliplayer... ' + elapsed + 's (type=' + typeof alp + ', null=' + (alp === null) + ', keys=' + dbgKeys + ')', 'warn');
      }
    }, 500);

    // Video ID: restore last-used
    const LAST_VID_KEY = 'drmTest_lastVideoId';
    document.getElementById('vidInput').value = localStorage.getItem(LAST_VID_KEY) || '';

    // Auto load video list
    async function listVideos() {
      log('กำลังโหลดรายการ video ทั้งหมด...', 'info');
      try {
        const res = await fetch('/api/china/videos');
        const data = await res.json();
        log('✅ พบ ' + data.count + ' videos', 'success');
        const picks = document.getElementById('quickPicks');
        picks.querySelectorAll('.quick').forEach(el => el.remove());
        (data.videos || []).forEach(v => {
          const span = document.createElement('span');
          span.className = 'quick';
          const shortId = v.videoId.substring(0, 8) + '…';
          span.textContent = v.title ? (v.title.substring(0, 20) + ' [' + shortId + ']') : shortId;
          span.title = v.videoId;
          span.onclick = () => {
            document.getElementById('vidInput').value = v.videoId;
            log('เลือก video: ' + v.videoId.substring(0, 8) + '...', 'info');
          };
          picks.appendChild(span);
        });
        // auto-fill if empty
        if (data.videos.length > 0 && !document.getElementById('vidInput').value) {
          document.getElementById('vidInput').value = data.videos[0].videoId;
        }
      } catch (err) {
        log('❌ โหลด list ไม่ได้: ' + err.message, 'err');
      }
    }
    setTimeout(listVideos, 800);

    async function loadDRM() {
      const videoId = document.getElementById('vidInput').value.trim();
      if (!videoId) {
        log('❌ กรุณากรอก Video ID หรือกด List เพื่อเลือก', 'err');
        return;
      }
      localStorage.setItem(LAST_VID_KEY, videoId);

      const alp = window.Aliplayer || (typeof Aliplayer !== 'undefined' ? Aliplayer : null);
      // ครอบทุก export type (SDK 2.35.4 export เป็น object, SDK เก่า export เป็น function)
      if (!alp || (typeof alp !== 'function' && typeof alp !== 'object')) {
        log('❌ Aliplayer ยังไม่พร้อม (type=' + typeof alp + ')', 'err');
        return;
      }
      if (!window.Aliplayer) window.Aliplayer = alp;

      log('กำลังขอ STS token (สำหรับ DRM)...', 'info');
      try {
        const res = await fetch('/api/china/sts/' + videoId);
        const data = await res.json();
        if (!data.accessKeyId || !data.securityToken) {
          log('❌ No STS: ' + JSON.stringify(data), 'err');
          return;
        }
        log('✅ STS token ได้ (expires: ' + data.expiration + ')', 'success');

        log('กำลังสร้าง Aliplayer (DRM mode with STS)...', 'info');
        log('DEBUG: window.Aliplayer type=' + typeof window.Aliplayer + ', is null=' + (window.Aliplayer === null) + ', keys=' + (window.Aliplayer ? Object.keys(window.Aliplayer).length : 0), 'info');
        const player = new window.Aliplayer({
          id: 'J_prismPlayer',
          vid: videoId,
          accessKeyId: data.accessKeyId,
          accessKeySecret: data.accessKeySecret,
          securityToken: data.securityToken,
          region: data.region || 'ap-southeast-1',
          width: '100%',
          height: '400px',
          autoplay: false,
          isLive: false,
          rePlay: false,
          playsinline: true,
          preload: true,
          controlBarVisibility: 'hover',
          useH5Prism: true,
          license: {
            domain: 'passport.medninja.academy',
            key: 'vPC0n17ZWmwsoyeP9659f501b25944c10903c73d068157faa'
          },
          encryptType: 2
        }, function (p) {
          log('✅ Aliplayer instance created', 'success');
        });

        player.on('ready', () => log('event: ready', 'info'));
        player.on('canplay', () => log('✅ event: canplay - DRM decrypted!', 'success'));
        player.on('play', () => log('▶️ event: play', 'info'));
        player.on('error', (e) => {
          const details = e && e.paramData ? JSON.stringify(e.paramData) : JSON.stringify(e || {});
          log('❌ ERROR: ' + details, 'err');
        });
        player.on('waiting', () => log('event: waiting (buffer)', 'warn'));
      } catch (err) {
        log('❌ Exception: ' + err.message, 'err');
      }
    }
  </script>
</body>
</html>
