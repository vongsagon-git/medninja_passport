<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="x-ua-compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no">
  <title>MedNinja DRM Test - Stream Selector</title>
  <!-- BUILD_VERSION: 2026-07-07-17:45-v29-encrypted-only -->
  <meta name="build-version" content="v29 · 17:45">

  <link rel="stylesheet" href="/vendor/aliplayer/aliplayer-2.35.4.css" />
  <script src="/vendor/aliplayer/aliplayer-2.35.4.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: linear-gradient(135deg, #1a0033 0%, #0f172a 100%);
      color: #f1f5f9;
      padding: 12px;
    }
    h1 { font-size: 20px; color: #a855f7; margin-bottom: 4px; }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    .version-badge {
      background: #4ade80;
      color: #052e16;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
      font-family: monospace;
    }
    button.reload-btn {
      background: #64748b;
      color: white;
      border: none;
      padding: 4px 10px;
      font-size: 11px;
      border-radius: 4px;
      cursor: pointer;
    }

    .info-card {
      background: rgba(168, 85, 247, 0.1);
      border: 1px solid rgba(168, 85, 247, 0.3);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 10px;
      word-break: break-all;
    }

    .video-input {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      max-width: 720px;
      flex-wrap: wrap;
    }
    .video-input input {
      flex: 1;
      min-width: 200px;
      padding: 10px 12px;
      background: rgba(168, 85, 247, 0.1);
      border: 1px solid rgba(168, 85, 247, 0.4);
      border-radius: 6px;
      color: #f1f5f9;
      font-family: 'Consolas', monospace;
      font-size: 12px;
    }
    .video-input button {
      background: #22c55e;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
    }

    /* Streams grid */
    .streams-title {
      font-size: 13px;
      color: #94a3b8;
      margin: 12px 0 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .streams-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    @media (min-width: 900px) {
      .streams-grid { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    }
    .stream-card {
      background: rgba(30, 41, 59, 0.5);
      border: 2px solid rgba(148, 163, 184, 0.2);
      border-radius: 10px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .stream-card:hover {
      border-color: rgba(168, 85, 247, 0.5);
      transform: translateY(-2px);
    }
    .stream-card.selected {
      border-color: #a855f7;
      background: rgba(168, 85, 247, 0.15);
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
    }
    .stream-card .type-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: bold;
      font-family: monospace;
      margin-bottom: 8px;
    }
    .stream-card.widevine .type-badge { background: rgba(168, 85, 247, 0.3); color: #c4b5fd; border: 1px solid rgba(168, 85, 247, 0.5); }
    .stream-card.proprietary .type-badge { background: rgba(59, 130, 246, 0.3); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.5); }
    .stream-card.unencrypted .type-badge { background: rgba(239, 68, 68, 0.3); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.5); }
    .stream-card h3 {
      font-size: 14px;
      margin-bottom: 6px;
    }
    .stream-card .details {
      font-size: 11px;
      color: #cbd5e1;
      line-height: 1.6;
    }
    .stream-card .details b { color: #f1f5f9; }
    .stream-card .play-btn {
      background: #a855f7;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
      margin-top: 8px;
      width: 100%;
    }
    .stream-card.proprietary .play-btn { background: #3b82f6; }
    .stream-card.unencrypted .play-btn { background: #ef4444; }

    /* Player */
    .player-wrap {
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 12px;
      max-width: 800px;
    }
    #J_prismPlayer { width: 100%; min-height: 300px; }

    .selected-info {
      background: rgba(74, 222, 128, 0.1);
      border: 1px solid rgba(74, 222, 128, 0.3);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 10px;
      color: #4ade80;
      display: none;
    }

    #log {
      background: #000;
      border: 1px solid rgba(74,222,128,0.2);
      border-radius: 8px;
      padding: 10px;
      font-family: 'Consolas', monospace;
      font-size: 11px;
      max-height: 250px;
      overflow-y: auto;
      color: #4ade80;
    }
    #log .err { color: #f87171; }
    #log .warn { color: #fbbf24; }
    #log .info { color: #38bdf8; }
    #log .success { color: #4ade80; font-weight: bold; }
  </style>
</head>
<body>
  <div class="header-row">
    <h1>🔐 DRM Stream Selector</h1>
    <div style="display: flex; gap: 6px; align-items: center;">
      <span class="version-badge" id="versionBadge">v29 · 17:45</span>
      <button class="reload-btn" onclick="location.reload(true)">🔄 Reload</button>
    </div>
  </div>

  <div class="info-card">
    <b>Your IP:</b> <span id="ipAddr">...</span> ·
    <b>Country:</b> <span id="ipCountry">-</span> ·
    <b>Device:</b> <span id="devInfo">-</span><br>
    <b>License:</b> Activated (Chinese Mainland region) ·
    <b>SDK:</b> Aliplayer 2.35.4 (self-host)
  </div>

  <!-- Video ID input -->
  <div class="video-input">
    <input id="vidInput" type="text" placeholder="กรอก Video ID..." />
    <button onclick="loadStreams()">🔍 Load Streams</button>
  </div>

  <!-- Streams grid (populated by loadStreams()) -->
  <div class="streams-title">🔐 Encrypted Streams (คลิกเพื่อเล่น) — Widevine vs Alibaba Proprietary</div>
  <div class="streams-grid" id="streamsGrid">
    <div style="color: #94a3b8; padding: 20px; text-align: center; grid-column: 1/-1;">
      กรอก Video ID แล้วกด "Load Streams" เพื่อดูรายการ...
    </div>
  </div>

  <!-- Selected info -->
  <div class="selected-info" id="selectedInfo"></div>

  <!-- Player -->
  <div class="player-wrap">
    <div id="J_prismPlayer"></div>
  </div>

  <!-- Log -->
  <div id="log"></div>

  <script>
    const sessionId = 'drm-sel-' + Math.random().toString(36).substring(2, 10);
    const logBuffer = [];
    let flushTimer = null;

    function flushLogs() {
      if (!logBuffer.length) return;
      const batch = logBuffer.splice(0, logBuffer.length);
      fetch('/api/china/log/batch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, entries: batch })
      }).catch(() => {});
    }

    const logEl = document.getElementById('log');
    function log(msg, type) {
      const line = document.createElement('div');
      line.className = type || '';
      line.textContent = '[' + new Date().toTimeString().slice(0,8) + '] ' + msg;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
      logBuffer.push({ level: type || 'info', msg, clientTs: new Date().toISOString() });
      if (flushTimer) clearTimeout(flushTimer);
      flushTimer = setTimeout(flushLogs, 500);
    }

    const buildVer = document.querySelector('meta[name="build-version"]').content;
    log('🏷️ Build: ' + buildVer, 'success');
    log('Session: ' + sessionId, 'info');

    // Device detect
    function detectDevice() {
      const ua = navigator.userAgent;
      let dev = 'Desktop', browser = '?';
      if (/iPhone/.test(ua)) dev = '📱 iPhone';
      else if (/iPad/.test(ua)) dev = '📱 iPad';
      else if (/Android.*Mobile/.test(ua)) dev = '📱 Android';
      else if (/Windows/.test(ua)) dev = '💻 Windows';
      else if (/Macintosh/.test(ua)) dev = '💻 Mac';

      if (/Edg\/([\d.]+)/.exec(ua)) browser = 'Edge ' + RegExp.$1;
      else if (/Chrome\/([\d.]+)/.exec(ua)) browser = 'Chrome ' + RegExp.$1;
      else if (/Firefox\/([\d.]+)/.exec(ua)) browser = 'Firefox ' + RegExp.$1;
      else if (/Version\/([\d.]+).*Safari/.exec(ua)) browser = 'Safari ' + RegExp.$1;

      document.getElementById('devInfo').textContent = dev + ' · ' + browser;
      log('📱 ' + dev + ' · ' + browser, 'info');
    }
    detectDevice();

    // IP
    (async () => {
      try {
        const res = await fetch('/api/china/whoami');
        const data = await res.json();
        const flag = { CN: '🇨🇳', TH: '🇹🇭', HK: '🇭🇰', SG: '🇸🇬', US: '🇺🇸' }[data.country] || '🌐';
        document.getElementById('ipAddr').textContent = data.ip || '-';
        document.getElementById('ipCountry').textContent = flag + ' ' + (data.country || '-');
        log('✅ IP: ' + data.ip + ' · ' + data.country, 'success');
      } catch (e) {}
    })();

    // Restore last video ID
    document.getElementById('vidInput').value = localStorage.getItem('drmTest_lastVideoId') || '0024f6c679d971f1a6aaf6f7c4590102';

    // Determine encryption type from stream metadata
    function getStreamType(stream) {
      if (!stream.encrypt || stream.encrypt === 0) return 'unencrypted';
      const type = (stream.encryptType || '').toLowerCase();
      if (type.includes('widevine') || type.includes('fairplay') || type === 'drm') return 'widevine';
      if (type.includes('private') || type.includes('alibaba') || type.includes('http') || type === '1') return 'proprietary';
      return 'unencrypted';
    }

    function getTypeLabel(type) {
      return {
        widevine: '🎯 Widevine DRM',
        proprietary: '⚡ Alibaba Proprietary',
        unencrypted: '⚠️ Unencrypted'
      }[type] || type;
    }

    function getEncryptTypeNum(type) {
      return { widevine: 2, proprietary: 1, unencrypted: 0 }[type] || 0;
    }

    let player = null;
    let currentVideoId = null;

    // ═══════════════════════════════════════════════════════════
    // Load streams from playinfo API
    // ═══════════════════════════════════════════════════════════
    async function loadStreams() {
      const videoId = document.getElementById('vidInput').value.trim();
      if (!videoId) {
        log('❌ กรุณากรอก Video ID', 'err');
        return;
      }
      currentVideoId = videoId;
      localStorage.setItem('drmTest_lastVideoId', videoId);
      log('🔍 Load streams: ' + videoId.substring(0, 8) + '...', 'info');

      const grid = document.getElementById('streamsGrid');
      grid.innerHTML = '<div style="color:#94a3b8;padding:20px;text-align:center;grid-column:1/-1;">⏳ กำลังโหลด...</div>';

      try {
        const res = await fetch('/api/china/playinfo/' + videoId);
        const data = await res.json();
        const streams = data.streams || [];

        log('✅ พบ ' + streams.length + ' streams', 'success');
        log('  Title: ' + ((data.videoBase && data.videoBase.Title) || '-'), 'info');
        log('  Duration: ' + ((data.videoBase && data.videoBase.Duration) || '-') + 's', 'info');

        if (streams.length === 0) {
          grid.innerHTML = '<div style="color:#f87171;padding:20px;text-align:center;grid-column:1/-1;">❌ ไม่พบ streams (video ยังไม่ transcode?)</div>';
          return;
        }

        // Filter: เก็บเฉพาะ encrypted streams (Widevine + Proprietary) - ข้าม original mov/mp4
        const playableStreams = streams.filter(s => s.encrypt && s.encrypt !== 0 && s.format === 'm3u8');

        if (playableStreams.length === 0) {
          grid.innerHTML = '<div style="color:#fbbf24;padding:20px;text-align:center;grid-column:1/-1;">⚠️ ไม่มี encrypted m3u8 stream (video ยังไม่ transcode ด้วย DRM/Proprietary?)</div>';
          log('⚠️ ไม่มี encrypted streams', 'warn');
          return;
        }

        // Render stream cards
        grid.innerHTML = '';
        playableStreams.forEach((stream, idx) => {
          const type = getStreamType(stream);
          const card = document.createElement('div');
          card.className = 'stream-card ' + type;
          card.dataset.type = type;
          card.dataset.idx = idx;
          card.innerHTML = `
            <span class="type-badge">${getTypeLabel(type)}</span>
            <h3>${stream.definition || 'Default'} · ${stream.format.toUpperCase()}</h3>
            <div class="details">
              <b>Resolution:</b> ${stream.width}×${stream.height}<br>
              <b>Bitrate:</b> ${parseFloat(stream.bitrate).toFixed(0)} kbps<br>
              <b>Size:</b> ${(stream.size / 1024 / 1024).toFixed(2)} MB<br>
              <b>Duration:</b> ${parseFloat(stream.duration).toFixed(1)}s<br>
              <b>Encrypt:</b> ${stream.encrypt ? '✅ ' + (stream.encryptType || 'yes') : '❌ no'}<br>
              <b>encryptType (SDK):</b> ${getEncryptTypeNum(type)}
            </div>
            <button class="play-btn" onclick="playStream(${idx}, '${type}')">▶ Play This Stream</button>
          `;
          grid.appendChild(card);
        });

        // Store streams globally
        window.__streams = playableStreams;

        log('✅ แสดง ' + playableStreams.length + ' streams ให้เลือก', 'success');
      } catch (err) {
        log('❌ Load streams error: ' + err.message, 'err');
        grid.innerHTML = '<div style="color:#f87171;padding:20px;text-align:center;grid-column:1/-1;">❌ ' + err.message + '</div>';
      }
    }

    // ═══════════════════════════════════════════════════════════
    // Play selected stream
    // ═══════════════════════════════════════════════════════════
    async function playStream(streamIdx, type) {
      const stream = window.__streams[streamIdx];
      if (!stream) {
        log('❌ stream ไม่พบ', 'err');
        return;
      }

      // Highlight selected card
      document.querySelectorAll('.stream-card').forEach(c => c.classList.remove('selected'));
      document.querySelector('.stream-card[data-idx="' + streamIdx + '"]').classList.add('selected');

      const encryptType = getEncryptTypeNum(type);
      const info = document.getElementById('selectedInfo');
      info.style.display = 'block';
      info.innerHTML = `🎬 กำลังเล่น: <b>${getTypeLabel(type)}</b> (encryptType: ${encryptType}) · Resolution: ${stream.width}×${stream.height} · ${parseFloat(stream.bitrate).toFixed(0)} kbps`;

      log('▶ Play: ' + type + ' (encryptType=' + encryptType + ')', 'info');

      // Get STS
      log('🔑 กำลังขอ STS...', 'info');
      let sts;
      try {
        const res = await fetch('/api/china/sts/' + currentVideoId);
        sts = await res.json();
        if (!sts.accessKeyId) throw new Error(sts.error || 'no STS');
        log('✅ STS ได้ (' + sts.accessKeyId.substring(0, 12) + '...)', 'success');
      } catch (err) {
        log('❌ STS: ' + err.message, 'err');
        return;
      }

      // Cleanup previous
      if (player) {
        try { player.dispose(); } catch (e) {}
        player = null;
      }

      // Create player
      log('🏗️ สร้าง Aliplayer (encryptType=' + encryptType + ')...', 'info');
      try {
        player = new window.Aliplayer({
          id: 'J_prismPlayer',
          vid: currentVideoId,
          accessKeyId: sts.accessKeyId,
          accessKeySecret: sts.accessKeySecret,
          securityToken: sts.securityToken,
          region: sts.region || 'ap-southeast-1',
          width: '100%',
          height: '400px',
          autoplay: false,
          isLive: false,
          rePlay: false,
          playsinline: true,
          preload: true,
          controlBarVisibility: 'hover',
          useH5Prism: true,
          license: {
            domain: 'passport.medninja.academy',
            key: 'vPC0n17ZWmwsoyeP9659f501b25944c10903c73d068157faa'
          },
          encryptType: encryptType
        }, function (p) {
          log('✅ Instance created', 'success');
        });

        player.on('ready', () => log('event: ready', 'info'));
        player.on('canplay', () => log('✅ event: canplay - decrypted!', 'success'));
        player.on('play', () => log('▶ event: play', 'success'));
        player.on('error', (e) => {
          const details = e && e.paramData ? JSON.stringify(e.paramData) : JSON.stringify(e || {});
          log('❌ ERROR: ' + details, 'err');
          info.innerHTML = '❌ Error: ' + details.substring(0, 150);
          info.style.color = '#f87171';
        });
      } catch (err) {
        log('❌ Exception: ' + err.message, 'err');
      }
    }

    // Auto-load streams on init
    setTimeout(() => {
      log('ℹ️ Auto-load streams...', 'info');
      loadStreams();
    }, 1500);
  </script>
</body>
</html>
