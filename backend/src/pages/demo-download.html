<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ดาวน์โหลด Slide — MedNinja</title>
<link rel="icon" type="image/png" href="/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Noto Sans Thai',-apple-system,sans-serif;background:#000;color:#fff;min-height:100%}
a{text-decoration:none;color:inherit}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

.page{min-height:100vh;min-height:100dvh;background:#000;position:relative;padding-bottom:40px;overflow-x:hidden}
.page::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(59,130,246,.22) 0%,transparent 55%),radial-gradient(ellipse at 100% 100%,rgba(99,102,241,.12) 0%,transparent 50%);pointer-events:none;z-index:0}

.hdr{position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:linear-gradient(180deg,rgba(0,0,0,.95),rgba(0,0,0,.6) 80%,transparent);backdrop-filter:blur(8px)}
.hdr-logo{display:flex;align-items:center;gap:8px}
.hdr-logo img{width:32px;height:32px;border-radius:8px}
.hdr-logo-text{font-size:13px;font-weight:900;letter-spacing:.5px;background:linear-gradient(135deg,#fff,#a1a1a1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-line{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:999px;background:#06C755;color:#fff;font-size:12px;font-weight:800;box-shadow:0 4px 12px rgba(6,199,85,.35);transition:transform .15s}
.hdr-line:active{transform:scale(.95)}
.hdr-line svg{width:14px;height:14px}

.hero{position:relative;z-index:1;padding:18px 20px 8px;text-align:center}
.hero-eyebrow{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.35);color:#93c5fd;font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px}
.hero-eyebrow svg{width:12px;height:12px}
.hero-title{font-size:26px;font-weight:900;line-height:1.18;letter-spacing:-.5px;margin-bottom:6px;background:linear-gradient(135deg,#fff 0%,#fff 55%,#3b82f6 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero-sub{font-size:13px;color:#94a3b8;font-weight:500;line-height:1.5}
.hero-sub b{color:#3b82f6;font-weight:800}

.mascot-wrap{position:relative;z-index:1;display:flex;justify-content:center;padding:14px 0 8px}
.mascot{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle at 50% 40%,rgba(59,130,246,.35) 0%,rgba(59,130,246,.05) 60%,transparent 80%);display:flex;align-items:center;justify-content:center;position:relative}
.mascot::after{content:'';position:absolute;inset:-8px;border-radius:50%;border:2px dashed rgba(59,130,246,.3);animation:spin 18s linear infinite}
.mascot img{width:120px;height:120px;object-fit:contain;filter:drop-shadow(0 12px 24px rgba(0,0,0,.6))}
@keyframes spin{to{transform:rotate(360deg)}}

.file-card{position:relative;z-index:1;margin:20px 16px 0;max-width:480px;margin-left:auto;margin-right:auto;background:linear-gradient(135deg,#0f172a 0%,#0b1220 100%);border:1px solid rgba(59,130,246,.18);border-radius:18px;padding:18px;box-shadow:0 12px 30px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05)}
.file-row{display:flex;align-items:center;gap:14px}
.file-icon{flex-shrink:0;width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,#3b82f6,#2563eb);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px rgba(59,130,246,.45)}
.file-icon svg{width:28px;height:28px;color:#fff}
.file-body{flex:1;min-width:0}
.file-label{font-size:10px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#64748b;margin-bottom:3px}
.file-name{font-size:15px;font-weight:800;color:#fff;line-height:1.3;word-break:break-word;margin-bottom:4px}
.file-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:#64748b;font-weight:600}
.file-meta span{display:inline-flex;align-items:center;gap:4px}
.file-meta svg{width:11px;height:11px}

.dl-wrap{position:relative;z-index:1;padding:18px 16px 8px;max-width:480px;margin:0 auto}
.dl-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:18px 22px;border-radius:14px;font-size:16px;font-weight:900;letter-spacing:.3px;background:linear-gradient(135deg,#3b82f6 0%,#2563eb 100%);color:#fff;box-shadow:0 10px 28px rgba(59,130,246,.45),inset 0 1px 0 rgba(255,255,255,.2);transition:transform .15s,box-shadow .2s;position:relative;overflow:hidden}
.dl-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.18),transparent 60%);pointer-events:none}
.dl-btn:active{transform:scale(.98)}
.dl-btn:disabled{opacity:.6;cursor:not-allowed}
.dl-btn svg{width:22px;height:22px}
.dl-hint{margin-top:10px;text-align:center;font-size:11px;color:#64748b;font-weight:600}
.dl-hint svg{width:11px;height:11px;display:inline;vertical-align:-1px;margin-right:3px}

.ads{position:relative;z-index:1;margin:24px 16px 0;max-width:480px;margin-left:auto;margin-right:auto}
.ads-label{font-size:10px;font-weight:700;letter-spacing:2px;color:#475569;text-transform:uppercase;text-align:center;margin-bottom:8px}
.ads-slot{min-height:120px;border-radius:14px;background:linear-gradient(135deg,rgba(15,23,42,.6),rgba(2,6,23,.6));border:1px dashed rgba(59,130,246,.2);display:flex;align-items:center;justify-content:center;color:#475569;font-size:12px;font-weight:600}

.foot{position:relative;z-index:1;padding:28px 18px 8px;text-align:center;max-width:480px;margin:0 auto}
.foot-brand{font-size:13px;font-weight:800;color:#fff;margin-bottom:4px}
.foot-tag{font-size:11px;color:#64748b;font-weight:500;line-height:1.6}

@media(min-width:640px){
  .hero{padding:28px 20px 12px}
  .hero-title{font-size:32px}
  .hero-sub{font-size:14px}
  .mascot{width:170px;height:170px}
  .mascot img{width:150px;height:150px}
  .file-card{padding:22px}
  .file-name{font-size:17px}
  .dl-btn{padding:20px 24px;font-size:17px}
}
@media(min-width:900px){
  .page{max-width:560px;margin:0 auto;box-shadow:0 0 60px rgba(59,130,246,.08)}
}
</style>
</head>
<body>

<div class="page">

  <header class="hdr">
    <a href="/" class="hdr-logo">
      <img src="/logo.png" alt="MedNinja" onerror="this.style.display='none'">
      <span class="hdr-logo-text">MedNinja</span>
    </a>
    <a href="https://line.me/R/ti/p/@medninja" target="_blank" rel="noopener" class="hdr-line">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63h2.386c.346 0 .627.285.627.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.63-.63.346 0 .628.285.628.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.282.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.078 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
      LINE
    </a>
  </header>

  <section class="hero">
    <div class="hero-eyebrow">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      ดาวน์โหลดฟรี
    </div>
    <h1 class="hero-title">MedNinja ติวสอบ ศรว.<br>NL · MEQ · OSCE ครบวงจร</h1>
    <p class="hero-sub">ตัวอย่าง Slide สำหรับนักเรียนแพทย์<br>โหลดได้เลย <b>ไม่ต้องสมัครสมาชิก</b></p>
  </section>

  <div class="mascot-wrap">
    <div class="mascot">
      <img src="/img/mascot.png" alt="MedNinja Mascot">
    </div>
  </div>

  <div class="file-card">
    <div class="file-row">
      <div class="file-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      </div>
      <div class="file-body">
        <div class="file-label">เอกสาร PDF</div>
        <div class="file-name" id="fileName">__FILENAME__</div>
        <div class="file-meta">
          <span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            PDF
          </span>
          <span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            อัปเดตล่าสุด
          </span>
        </div>
      </div>
    </div>
  </div>

  <div class="dl-wrap">
    <button class="dl-btn" id="dlBtn" onclick="startDownload()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span id="dlLabel">ดาวน์โหลดเลย</span>
    </button>
    <div class="dl-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      เอกสารปลอดภัย ไม่ติดไวรัส
    </div>
  </div>

  <div class="foot">
    <div class="foot-brand">MedNinja Academy</div>
    <div class="foot-tag">ติวสอบ ศรว. NL · MEQ · OSCE ครบวงจร<br>medninja.academy</div>
  </div>

</div>

<script>
function startDownload(){
  const btn = document.getElementById('dlBtn')
  const label = document.getElementById('dlLabel')
  const fileName = document.getElementById('fileName').textContent.trim()
  btn.disabled = true
  label.textContent = 'กำลังเตรียมไฟล์...'
  window.location.href = '/api/demo/download/' + encodeURIComponent(fileName)
  setTimeout(() => {
    label.textContent = 'ดาวน์โหลดเลย'
    btn.disabled = false
  }, 3000)
}
</script>

</body>
</html>
