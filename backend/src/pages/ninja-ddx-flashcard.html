// ═══ LIFF ═══
async function initLiff(){
  const liffUrl='https://liff.line.me/'+LIFF_ID
  showLoading()
  try{
    await liff.init({liffId:LIFF_ID})
    // ถ้า login แล้ว → เล่นได้เลย (ไม่ว่า isInClient หรือไม่)
    if(liff.isLoggedIn()){
      // OK — ไปต่อ getProfile
    }else if(liff.isInClient()){
      liff.login();return
    }else{
      // ไม่ได้อยู่ใน LIFF + ไม่ได้ login → แสดงหน้า QR
      showOpenInLine();return
    }
    const p=await liff.getProfile()
    lineUser={userId:p.userId,displayName:p.displayName,pictureUrl:p.pictureUrl}
    try{
      const rr=await fetch('/api/flashcard/result',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lineUserId:lineUser.userId,displayName:lineUser.displayName,pictureUrl:lineUser.pictureUrl,totalCardsRevealed:0,totalSessions:1})})
      const rd=await rr.json()
      if(rd.stars) playerStars=rd.stars
    }catch(e){}
    showPromo()
  }catch(e){
    // liff.init() fail — ไม่ใช่ LIFF environment
    if(location.hostname==='localhost'){lineUser={userId:'dev',displayName:'Dev',pictureUrl:''};showPromo()}
    else{showOpenInLine()}
  }
}

let deck=[],idx=0,flipped=false,currentMode='',playerStars=0
let roundScore={correct:0,total:0,categories:{},wrongCards:[]} // เก็บคะแนนรอบนี้

// จำนวนการ์ดต่อรอบตาม level
function getRoundSize(stars){
  if(stars>=100) return 28
  if(stars>=50) return 23
  if(stars>=30) return 18
  if(stars>=15) return 13
  if(stars>=5) return 8
  return 3
}

async function startRound(){
  showLoading()
  try{
    const roundSize=getRoundSize(playerStars)
    // แบ่ง 3 โหมดค่อนข้างเท่ากัน
    const perMode=Math.ceil(roundSize/3)
    const ts=Date.now()
    const [pRes,ccRes,ddxRes]=await Promise.all([
      fetch(`/api/flashcard/cards?mode=${perMode}&lineUserId=${lineUser.userId}&_t=${ts}`).then(r=>r.json()),
      fetch(`/api/flashcard/cc-cards?mode=${perMode}&lineUserId=${lineUser.userId}&_t=${ts}`).then(r=>r.json()),
      fetch(`/api/flashcard/ddx-cards?mode=${perMode}&lineUserId=${lineUser.userId}&_t=${ts}`).then(r=>r.json()),
    ])
    // tag แต่ละใบว่าเป็นโหมดไหน
    const all=[]
    ;(pRes.cards||[]).forEach(c=>{c._mode='pattern';all.push(c)})
    ;(ccRes.cards||[]).forEach(c=>{c._mode='cc';all.push(c)})
    ;(ddxRes.cards||[]).forEach(c=>{c._mode='ddx';all.push(c)})
    // สลับ
    for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]]}
    deck=all.slice(0,roundSize);idx=0;flipped=false
    roundScore={correct:0,total:0,categories:{},wrongCards:[]}
    renderCard()
  }catch(e){console.error(e);alert('โหลดไม่สำเร็จ')}
}

function getQuestion(d){
  const m=d._mode||'pattern'
  if(m==='cc') return 'DDx ที่ต้องนึกถึง?'
  if(m==='ddx') return 'มาด้วยอาการอะไร?'
  return 'นึกถึงอะไร?'
}

function getFrontText(d){
  const m=d._mode||'pattern'
  if(m==='cc') return `${d.cc}<br><span style="font-size:14px;color:rgba(255,255,255,.4)">${d.ccEn}</span>`
  if(m==='ddx') return d.ddx
  return d.pattern.replace(/\n/g,'<br>')
}

function getFrontClass(d){
  const m=d._mode||'pattern'
  if(m==='cc') return 'cc'
  if(m==='ddx') return 'ddx'
  return catClass(d.category||'Neuro')
}

function getModeLabel(d){
  const m=d._mode||'pattern'
  if(m==='cc') return 'CC → DDx'
  if(m==='ddx') return 'DDx → CC'
  return d.category||'Pattern → DDx'
}

  const isFlipped=card.classList.contains('flipped')
  if(isFlipped){
    card.classList.remove('flipped')
    document.getElementById('btns').innerHTML=`<button class="btn btn-flip" onclick="unflip()">เปิดดูคำตอบ</button>`
  }else{
    card.classList.add('flipped')
    document.getElementById('btns').innerHTML=`
      <button class="btn btn-correct" onclick="answer(true)">✅ นึกออก</button>
      <button class="btn btn-wrong" onclick="answer(false)">❌ นึกไม่ออก</button>`
  }
}

async function flip(){
  if(flipped)return;flipped=true;cardsRevealed++
  const d=deck[idx]
  const m=d._mode||'pattern'
  try{
    if(m==='cc'){
      const r=await fetch('/api/flashcard/cc-reveal',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cardId:d.id,lineUserId:lineUser.userId})})
      const data=await r.json()
      if(r.ok){
        document.getElementById('ans').textContent=data.ddxCount+' DDx'
        document.getElementById('ans-points').innerHTML=data.ddxList.map(dx=>`<li>${dx}</li>`).join('')
      }
    }else if(m==='ddx'){
      const r=await fetch('/api/flashcard/ddx-reveal',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cardId:d.id,ddx:d.ddx,lineUserId:lineUser.userId})})
      const data=await r.json()
      if(r.ok){
        document.getElementById('ans').textContent=data.ddxTh||d.ddx
        const parts=[]
        if(data.relatedCC&&data.relatedCC.length) parts.push(`<li><b>C/C:</b> ${data.relatedCC.join(', ')}</li>`)
        if(data.clue) parts.push(`<li style="white-space:pre-line">${data.clue.replace(/\n/g,'<br>')}</li>`)
        if(!parts.length) parts.push(...(data.relatedCC||[]).map(c=>`<li>${c}</li>`))
        document.getElementById('ans-points').innerHTML=parts.join('')
      }
    }else{
      const r=await fetch('/api/flashcard/reveal',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cardId:d.id,lineUserId:lineUser.userId})})
      const data=await r.json()
      if(r.ok){
        const parts=data.answer.split('|').map(s=>s.trim())
        document.getElementById('ans').textContent=parts[0]
        if(parts[1]) document.getElementById('ans-sub').textContent=parts[1]
        if(data.mnemonic){
          document.getElementById('memo-box').style.display='block'
          document.getElementById('memo').textContent='💡 '+data.mnemonic
        }
      }
    }
  }catch(e){console.error(e)}
  document.getElementById('card').classList.add('flipped')
  document.getElementById('btns').innerHTML=`
    <button class="btn btn-correct" onclick="answer(true)">✅ นึกออก</button>
    <button class="btn btn-wrong" onclick="answer(false)">❌ นึกไม่ออก</button>`
  // บันทึกจำนวนเปิดการ์ด
  try{fetch('/api/flashcard/result',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({lineUserId:lineUser.userId,displayName:lineUser.displayName,pictureUrl:lineUser.pictureUrl,totalCardsRevealed:1,totalSessions:0})})}catch(e){}
}

function getCardCategory(d){
  const m=d._mode||'pattern'
  if(m==='pattern') return d.category||'อื่นๆ'
  if(m==='cc') return 'CC'
  return 'DDx'
}

function answer(correct){
  const d=deck[idx]
  const cat=getCardCategory(d)
  roundScore.total++
  if(correct) roundScore.correct++
  if(!roundScore.categories[cat]) roundScore.categories[cat]={correct:0,total:0}
  roundScore.categories[cat].total++
  if(correct) roundScore.categories[cat].correct++
  // เก็บการ์ดที่นึกไม่ออก
  if(!correct){
    const m=d._mode||'pattern'
    const name=m==='pattern'?d.pattern:m==='cc'?`${d.cc} (${d.ccEn||''})`:d.ddx
    roundScore.wrongCards.push(name)
  }
  // ไปการ์ดถัดไป
  document.getElementById('card').classList.add('sr')
  setTimeout(()=>{idx++;renderCard()},250)
}

}else if(urlParams.get('page')==='mindmap'){

}
</script>
