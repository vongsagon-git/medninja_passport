<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extension Check — MedNinja</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans Thai', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 40px 20px; }
  h1 { text-align: center; margin-bottom: 8px; font-size: 22px; }
  .sub { text-align: center; color: #94a3b8; font-size: 13px; margin-bottom: 32px; }
  .container { max-width: 500px; margin: 0 auto; }
  .card { background: #1e293b; border-radius: 12px; padding: 16px 20px; margin-bottom: 12px; display: flex; align-items: center; gap: 14px; transition: all .3s; }
  .card.checking { opacity: .5; }
  .card.found { border: 2px solid #ef4444; background: rgba(239,68,68,.1); }
  .card.safe { border: 2px solid #22c55e; background: rgba(34,197,94,.05); }
  .icon { width: 40px; height: 40px; border-radius: 8px; background: #334155; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .card.found .icon { background: #dc2626; }
  .card.safe .icon { background: #16a34a; }
  .info { flex: 1; }
  .name { font-weight: 700; font-size: 14px; }
  .ext-id { font-size: 10px; color: #64748b; font-family: monospace; word-break: break-all; }
  .status { font-size: 12px; font-weight: 600; margin-top: 2px; }
  .card.found .status { color: #f87171; }
  .card.safe .status { color: #4ade80; }
  .card.checking .status { color: #94a3b8; }
  .summary { text-align: center; margin-top: 24px; padding: 20px; border-radius: 12px; font-size: 15px; font-weight: 700; }
  .summary.danger { background: rgba(239,68,68,.15); color: #f87171; border: 2px solid #ef4444; }
  .summary.ok { background: rgba(34,197,94,.1); color: #4ade80; border: 2px solid #22c55e; }
  .note { text-align: center; color: #64748b; font-size: 11px; margin-top: 16px; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid #475569; border-top-color: #a855f7; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn { display: block; margin: 24px auto 0; padding: 12px 32px; background: linear-gradient(135deg,#a855f7,#7c3aed); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .btn:hover { opacity: .9; }
</style>
</head>
<body>
<div class="container">
  <h1>Extension Check</h1>
  <p class="sub">ตรวจสอบว่ามี Extension ดาวน์โหลดวีดีโอติดตั้งอยู่หรือไม่</p>

  <div id="list"></div>
  <div id="summary"></div>
  <p class="note">ใช้วิธี probe web_accessible_resources (icon.png) ของแต่ละ Extension ID</p>
  <button class="btn" onclick="runCheck()">ตรวจใหม่</button>
</div>

<script>
const EXTENSIONS = [
  { id: 'iogidnfllpdhagebkblkgbfijkbkjdmm', name: 'Stream Recorder' },
  { id: 'nfmmmhanepmpifddlkkmihkalkoekpfd', name: 'FetchV' },
  { id: 'dcfofgiipjlhkemnpmiakbmblkbhgmga', name: 'Video DownloadHelper' },
  { id: 'lmjnegcaeklhafolokijcfjliaokphfk', name: 'Video Downloader Pro' },
  { id: 'cjpalhdlnbpafiamejdnhcphjbkeiagm', name: 'uBlock Origin' },
]

// ลอง probe หลาย path เผื่อ icon.png ไม่ expose
const PROBE_PATHS = ['icon.png', 'icons/icon.png', 'icons/icon128.png', 'icons/icon48.png', 'icon128.png', 'icon48.png', 'icon16.png', 'manifest.json']

function probeOne(ext) {
  return new Promise((resolve) => {
    if (typeof chrome === 'undefined' || !chrome.runtime) {
      return resolve({ ...ext, found: false, note: 'ไม่ใช่ Chrome' })
    }
    let done = false
    let tried = 0

    PROBE_PATHS.forEach(path => {
      const img = new Image()
      img.onload = () => {
        if (!done) { done = true; resolve({ ...ext, found: true, path }) }
      }
      img.onerror = () => {
        if (++tried >= PROBE_PATHS.length && !done) {
          done = true
          resolve({ ...ext, found: false })
        }
      }
      img.src = `chrome-extension://${ext.id}/${path}`
    })

    // timeout 3s
    setTimeout(() => {
      if (!done) { done = true; resolve({ ...ext, found: false, note: 'timeout' }) }
    }, 3000)
  })
}

function renderCard(ext, state) {
  const cls = state === 'checking' ? 'checking' : ext.found ? 'found' : 'safe'
  const icon = state === 'checking' ? '<div class="spinner"></div>' : ext.found ? '🚨' : '✅'
  const status = state === 'checking' ? 'กำลังตรวจ...'
    : ext.found ? `พบ! (${ext.path})` : 'ไม่พบ'
  return `<div class="card ${cls}">
    <div class="icon">${icon}</div>
    <div class="info">
      <div class="name">${ext.name}</div>
      <div class="ext-id">${ext.id}</div>
      <div class="status">${status}${ext.note ? ' · ' + ext.note : ''}</div>
    </div>
  </div>`
}

async function runCheck() {
  const list = document.getElementById('list')
  const summary = document.getElementById('summary')
  summary.innerHTML = ''

  // แสดง checking state
  list.innerHTML = EXTENSIONS.map(e => renderCard(e, 'checking')).join('')

  const results = await Promise.all(EXTENSIONS.map(e => probeOne(e)))

  // แสดงผล
  list.innerHTML = results.map(e => renderCard(e, 'done')).join('')

  const foundList = results.filter(r => r.found)
  if (foundList.length > 0) {
    summary.className = 'summary danger'
    summary.innerHTML = `🚨 พบ ${foundList.length} Extension: ${foundList.map(e => e.name).join(', ')}`
  } else {
    summary.className = 'summary ok'
    summary.innerHTML = '✅ ไม่พบ Extension ดาวน์โหลดวีดีโอ'
  }
}

runCheck()
</script>
</body>
</html>
