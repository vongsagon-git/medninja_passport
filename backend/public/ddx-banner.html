<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDx Arena Banner 1:1</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;700;900&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; align-items: center; justify-content: center; min-height: 100vh; }

.banner {
  width: 1080px; height: 1080px;
  background: radial-gradient(ellipse at 30% 20%, rgba(124,58,237,.15) 0%, transparent 60%),
              radial-gradient(ellipse at 70% 80%, rgba(249,115,22,.1) 0%, transparent 60%),
              linear-gradient(135deg, #08080d 0%, #0a0a14 50%, #0d0812 100%);
  position: relative; overflow: hidden;
  font-family: 'Noto Sans Thai', sans-serif;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}

/* Grid lines background */
.banner::before {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(124,58,237,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,58,237,.04) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* Glow orbs */
.glow1 { position: absolute; top: -100px; left: -100px; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(124,58,237,.2), transparent 70%); }
.glow2 { position: absolute; bottom: -80px; right: -80px; width: 350px; height: 350px; border-radius: 50%; background: radial-gradient(circle, rgba(249,115,22,.15), transparent 70%); }
.glow3 { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(251,191,36,.05), transparent 70%); }

/* Top accent line */
.top-line { position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #7c3aed, #f97316, #fbbf24, #f97316, #7c3aed); }

/* Content */
.content { position: relative; z-index: 1; text-align: center; padding: 60px; }

.subtitle-top { font-size: 22px; font-weight: 700; color: #64748b; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 20px; }

.logo-med { font-size: 48px; font-weight: 900; color: #a78bfa; letter-spacing: 12px; text-transform: uppercase; }
.logo-ddx { font-family: 'Orbitron', sans-serif; font-size: 120px; font-weight: 900; color: #f97316; line-height: 1; text-shadow: 0 0 60px rgba(249,115,22,.4), 0 0 120px rgba(249,115,22,.1); }
.logo-arena { font-family: 'Orbitron', sans-serif; font-size: 90px; font-weight: 900; color: #fff; letter-spacing: 24px; line-height: 1; margin-top: -5px; text-shadow: 0 0 40px rgba(255,255,255,.1); }

.tagline { font-size: 28px; font-weight: 700; color: #e2e8f0; margin-top: 40px; line-height: 1.5; }
.tagline span { color: #fbbf24; }

.stats-row { display: flex; gap: 40px; justify-content: center; margin-top: 36px; }
.stat { text-align: center; }
.stat-num { font-family: 'Orbitron', sans-serif; font-size: 36px; font-weight: 900; color: #fbbf24; }
.stat-label { font-size: 14px; color: #64748b; margin-top: 4px; font-weight: 700; }

.cta { margin-top: 44px; background: linear-gradient(135deg, #f97316, #dc2626); color: #fff; font-size: 28px; font-weight: 900; padding: 18px 60px; border-radius: 16px; border: none; font-family: 'Noto Sans Thai', sans-serif; box-shadow: 0 0 40px rgba(249,115,22,.4); }

.free-badge { margin-top: 20px; font-size: 18px; font-weight: 700; color: #22c55e; letter-spacing: 4px; }

.url { position: absolute; bottom: 40px; font-size: 20px; font-weight: 700; color: #475569; letter-spacing: 2px; }

/* Floating elements */
.float-icon { position: absolute; font-size: 40px; opacity: .15; }
.fi1 { top: 80px; right: 100px; transform: rotate(15deg); }
.fi2 { bottom: 120px; left: 80px; transform: rotate(-10deg); }
.fi3 { top: 200px; left: 120px; transform: rotate(5deg); }
.fi4 { bottom: 200px; right: 120px; transform: rotate(-20deg); }
</style>
</head>
<body>

<div class="banner">
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="glow3"></div>
  <div class="top-line"></div>

  <div class="float-icon fi1">🧬</div>
  <div class="float-icon fi2">⚡</div>
  <div class="float-icon fi3">🎯</div>
  <div class="float-icon fi4">🏆</div>

  <div class="content">
    <div class="subtitle-top">DIFFERENTIAL DIAGNOSIS</div>
    <div class="logo-med">MEDNINJA</div>
    <div class="logo-ddx">DDx</div>
    <div class="logo-arena">ARENA</div>

    <div class="tagline">เกมฝึกวินิจฉัยแยกโรค<br><span>แข่งกันว่าใครจะเป็นที่หนึ่ง</span></div>

    <div class="stats-row">
      <div class="stat"><div class="stat-num">462</div><div class="stat-label">DDx โจทย์</div></div>
      <div class="stat"><div class="stat-num">151</div><div class="stat-label">Pattern</div></div>
      <div class="stat"><div class="stat-num">73</div><div class="stat-label">Chief Complaint</div></div>
    </div>

    <button class="cta">⚔️ เข้าสนามประลอง</button>

    <div class="free-badge">เล่นฟรี โดย MedNinja</div>
  </div>

  <div class="url">ddx.medninja.academy</div>
</div>

</body>
</html>
