<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDx Arena — ยืนยันตัวตน</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans Thai',-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0a0a0f,#1a1a25);color:#e2e8f0;padding:20px}
.card{background:#12121a;border-radius:20px;padding:40px 30px;max-width:380px;width:100%;text-align:center;border:1px solid rgba(255,255,255,.08)}
.icon{font-size:56px;margin-bottom:16px}
h2{font-size:20px;font-weight:800;margin-bottom:8px}
p{font-size:14px;color:#94a3b8;margin-bottom:20px}
.spinner{width:36px;height:36px;border:4px solid rgba(255,255,255,.1);border-top-color:#06C755;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.success{color:#22c55e}
.error{color:#ef4444}
.msg{font-size:16px;font-weight:700;margin-bottom:8px}
.sub{font-size:13px;color:#64748b}
</style>
</head>
<body>
<div class="card">
  <div id="content">
    <div class="icon">⚔️</div>
    <div class="spinner"></div>
    <p>กำลังยืนยันตัวตน...</p>
  </div>
</div>

<script>
const LIFF_ID = '2009259048-iAvDwtRh'

async function init() {
  // อ่าน token จาก URL
  const params = new URLSearchParams(window.location.search)
  const loginToken = params.get('t')
  if (!loginToken) { showResult('error', '❌', 'ลิงก์ไม่ถูกต้อง', 'ไม่พบ token'); return }

  // โหลด LIFF
  try {
    await loadScript('https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js')
    await liff.init({ liffId: LIFF_ID })

    if (!liff.isLoggedIn()) {
      liff.login({ redirectUri: window.location.href })
      return
    }

    const idToken = liff.getIDToken()
    if (!idToken) { showResult('error', '❌', 'ไม่ได้รับ idToken', 'กรุณาลองใหม่'); return }

    // ส่ง confirm ไป server
    const resp = await fetch('/api/arena/qr-confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: loginToken, idToken })
    })
    const data = await resp.json()

    if (data.ok) {
      showResult('success', '✅', 'เข้าสู่ระบบสำเร็จ!', 'กลับไปเล่นที่ Desktop ได้เลย')
    } else {
      showResult('error', '❌', 'ไม่สำเร็จ', data.error || 'กรุณาลองใหม่')
    }
  } catch (err) {
    showResult('error', '❌', 'เกิดข้อผิดพลาด', err.message)
  }
}

function showResult(type, icon, msg, sub) {
  document.getElementById('content').innerHTML = `
    <div class="icon">${icon}</div>
    <div class="msg ${type}">${msg}</div>
    <div class="sub">${sub}</div>`
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script'); s.src = src
    s.onload = resolve; s.onerror = reject; document.head.appendChild(s)
  })
}

init()
</script>
</body>
</html>
